<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duyurular | AKARA</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Blogger'ı sitemizle bütünleştiren özel ayarlar */
        .blogger-wrapper {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            border: 1px solid #111; /* Metalik ince çerçeve */
            background: #050505;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 4px;
            overflow: hidden;
        }
        
        iframe {
            width: 100%;
            height: 800px; /* Duyuruların uzunluğuna göre burayı değiştirebilirsin */
            border: none;
            /* Scroll bar'ı koyu yapmak için */
            color-scheme: dark;
        }

        .loading-text {
            color: #333;
            font-size: 0.8rem;
            text-align: center;
            margin-top: 10px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body class="ana-tema">

    <div id="sidebar" class="sidebar">
        <a href="index.html">Ana Menü</a>
        <a href="kitaplar.html">Kitaplar</a>
        <a href="duyurular.html">Duyurular</a>
        <a href="iletisim.html">İletişim</a>
    </div>

    <div class="menu-icon" onclick="toggleSidebar()">
        <span></span><span></span><span></span>
    </div>

    <div class="container">
        <header class="section">
            <h1 class="main-title">DUYURULAR</h1>
            <div class="divider"></div>
            <p class="subtitle">Yazar panelinden gelen son güncellemeler.</p>
        </header>

        <div class="blogger-wrapper">
            <iframe src="https://akaraduyuru.blogspot.com" title="AKARA Duyurular"></iframe>
        </div>
        
        <p class="loading-text">Veriler Blogger altyapısı ile anlık güncellenir.</p>
    </div>

    <script>
        function toggleSidebar() {
            document.getElementById("sidebar").classList.toggle('active');
        }

        // Sayfa tıklandığında sidebar'ı kapatma (Mobil kolaylık)
        document.addEventListener('click', function(event) {
            const sidebar = document.getElementById('sidebar');
            const menuIcon = document.querySelector('.menu-icon');
            if (!sidebar.contains(event.target) && !menuIcon.contains(event.target)) {
                sidebar.classList.remove('active');
            }
        });
    </script>
</body>
</html>
