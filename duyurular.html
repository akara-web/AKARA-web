

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duyurular | AKARA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="ana-tema">

    <div id="sidebar" class="sidebar">
        <a href="index.html">Ana Menü</a>
        <a href="kitaplar.html">Kitaplar</a>
        <a href="duyurular.html">Duyurular</a>
        <a href="iletisim.html">İletişim</a>
    </div>

    <div class="menu-icon" onclick="toggleSidebar()">
        <span></span><span></span><span></span>
    </div>

    <div class="container">
        <header class="section">
            <h1 class="main-title" onclick="adminGiris()" style="cursor: pointer;">DUYURULAR</h1>
            <div class="divider"></div>
            <p class="subtitle">En güncel haberler ve duyurular.</p>
        </header>

        <div id="adminPanel" class="admin-box" style="display:none;">
            <h3>Yeni Duyuru Ekle</h3>
            <input type="text" id="baslikInput" placeholder="Duyuru Başlığı...">
            <textarea id="icerikInput" placeholder="Duyuru içeriğini buraya yaz..." rows="4"></textarea>
            <div class="panel-btns">
                <button class="social-btn" onclick="duyuruEkle()">YAYINLA</button>
                <button class="social-btn" onclick="panelKapat()" style="background:#1a1a1a;">İPTAL</button>
            </div>
        </div>

        <div id="duyuruListesi" class="announcement-list">
            <div class="announcement-card">
                <span class="date">21.04.2026</span>
                <h3>Sistem Güncellendi</h3>
                <p>Artık başlığa tıklayıp şifrenle duyuru ekleyebilirsin.</p>
            </div>
        </div>
    </div>

    <script>
        function toggleSidebar() {
            document.getElementById("sidebar").classList.toggle('active');
        }

        // ŞİFRE KONTROLÜ
        function adminGiris() {
            const sifre = prompt("Yönetici Şifresi:");
            if (sifre === "akara123") { // Şifren bu, istersen değiştirebilirsin
                document.getElementById('adminPanel').style.display = 'block';
            } else {
                alert("Hatalı şifre!");
            }
        }

        function panelKapat() {
            document.getElementById('adminPanel').style.display = 'none';
        }

        function duyuruEkle() {
            const baslik = document.getElementById('baslikInput').value;
            const icerik = document.getElementById('icerikInput').value;
            const liste = document.getElementById('duyuruListesi');
            const tarih = new Date().toLocaleDateString('tr-TR');

            if(!baslik || !icerik) return alert("Boş bırakma!");

            const yeniKart = `
                <div class="announcement-card">
                    <span class="date">${tarih}</span>
                    <h3>${baslik}</h3>
                    <p>${icerik}</p>
                </div>`;
            
            // En yeni duyuruyu listenin başına (en üste) ekler
            liste.insertAdjacentHTML('afterbegin', yeniKart);
            
            // Temizlik
            document.getElementById('baslikInput').value = "";
            document.getElementById('icerikInput').value = "";
            panelKapat();
            
            alert("Duyuru eklendi! Sayfayı kapatmadan önce GitHub'da güncellemeyi unutma.");
        }
    </script>
</body>
</html>
