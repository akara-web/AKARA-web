<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seriler | Akara</title>
    <style>
        /* TEMEL AYARLAR */
        body { background-color: #050505; color: #d1d1d1; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; overflow-x: hidden; }

        /* SIDEBAR - ANA SAYFAYLA AYNI STİL */
        .sidebar { 
            width: 250px; height: 100vh; background-color: #0d0d0d; border-right: 1px solid #222; 
            position: fixed; left: -250px; /* Kapalı başlar */
            display: flex; flex-direction: column; align-items: center; padding-top: 80px; 
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000;
        }
        
        .sidebar.active { left: 0; }

        .sidebar a { 
            text-decoration: none; color: #888; padding: 15px 25px; width: 80%; text-align: center; 
            transition: 0.3s; font-weight: bold; margin-bottom: 10px; border-radius: 8px; 
        }
        .sidebar a:hover { color: #fff; background: #1a1a1a; box-shadow: 0 0 10px rgba(93, 173, 226, 0.5); text-shadow: 0 0 5px #5dade2; }

        /* ANA SAYFA İLE AYNI "ÜÇ NOKTA/ÇİZGİ" BUTONU */
        .menu-btn {
            position: fixed; top: 20px; left: 20px; font-size: 28px; /* Boyut ana sayfadaki gibi */
            background: none; border: none; color: white; /* Şeffaf arka plan */
            cursor: pointer; z-index: 1100; transition: 0.3s;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }
        .menu-btn:hover { color: #5dade2; transform: scale(1.1); }

        /* İÇERİK ALANI */
        .content { width: 100%; padding: 100px 20px 40px 20px; display: flex; flex-direction: column; align-items: center; transition: 0.4s; }

        /* SERİ BUTONLARI (AKORDEON) */
        .seri-buton { 
            width: 100%; max-width: 800px; background: #111; border: 1px solid #333; border-radius: 15px; 
            padding: 40px 20px; color: white; font-size: 1.6rem; cursor: pointer; transition: 0.4s; 
            text-transform: uppercase; margin-bottom: 10px; font-weight: bold;
        }
        .seri-buton:hover { border-color: #5dade2; background: #161616; box-shadow: 0 0 15px rgba(93, 173, 226, 0.2); }
        
        .seri-icerik { max-height: 0; overflow: hidden; transition: max-height 0.5s ease-out; background: #0a0a0a; border-radius: 0 0 15px 15px; width: 100%; max-width: 800px; margin-bottom: 20px; }
        
        /* KİTAP IZGARASI */
        .kitap-izgara { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 25px; padding: 30px; }
        
        .kitap-kart { text-decoration: none; color: #5dade2; text-align: center; }
        .kitap-kart img { width: 100%; border-radius: 10px; border: 1px solid #222; transition: 0.3s; }
        .kitap-kart h3 { font-size: 0.9rem; margin-top: 10px; color: #ccc; }
        .kitap-kart:hover img { transform: translateY(-5px); border-color: #5dade2; box-shadow: 0 5px 15px rgba(93, 173, 226, 0.3); }

        /* ARKA PLAN KARARTMA */
        .overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 900; backdrop-filter: blur(3px);
        }
        .overlay.active { display: block; }

        /* MOBİL DOKUNUŞLAR */
        @media (max-width: 600px) {
            .seri-buton { font-size: 1.2rem; padding: 30px 15px; }
            .kitap-izgara { grid-template-columns: repeat(2, 1fr); gap: 15px; }
        }
    </style>
</head>
<body>

    <button class="menu-btn" onclick="toggleMenu()">☰</button>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <div class="sidebar" id="mySidebar">
        <a href="index.html">Ana Menüye Dön</a>
        <a href="kitaplar.html">Kitaplar</a>
        <a href="seriler.html" style="color:#fff; background:#1a1a1a;">Seriler</a>
        <a href="iletisim.html">İletişim</a>
        <a href="duyurular.html">Duyurular</a>
    </div>

    <div class="content">
        <h1 style="color:#808080; margin-bottom: 50px; letter-spacing: 2px;">SERİLER</h1>

        <button class="seri-buton">RÜZGARDA KALAN SESLER</button>
        <div class="seri-icerik">
            <div class="kitap-izgara">
                <a href="kitaplar.html" class="kitap-kart">
                    <img src="LİMANI_KAYIP_GEMİ_KAPAK_URL" alt="LİMANI KAYIP GEMİ⚓">
                    <h3>LİMANI KAYIP GEMİ⚓</h3>
                </a>
                </div>
        </div>

        <button class="seri-buton">LİMANI KAYIP GEMİ ⚓</button>
        <div class="seri-icerik">
            <div class="kitap-izgara">
                 <p style="text-align: center; width: 100%; color: #666;">Çok yakında burada...</p>
            </div>
        </div>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById("mySidebar").classList.toggle("active");
            document.getElementById("overlay").classList.toggle("active");
        }

        var acc = document.getElementsByClassName("seri-buton");
        for (var i = 0; i < acc.length; i++) {
            acc[i].onclick = function() {
                var panel = this.nextElementSibling;
                if (panel.style.maxHeight) {
                    panel.style.maxHeight = null;
                } else {
                    panel.style.maxHeight = panel.scrollHeight + "px";
                }
            }
        }
    </script>

</body>
</html>
